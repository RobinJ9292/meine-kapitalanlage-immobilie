<text x="340" y="102" text-anchor="middle" font-size="13.5" font-weight="700" fill="#c0392b">Verkauf steuerpflichtig (pers&#246;nlicher Steuersatz)</text>
<text x="662" y="102" text-anchor="middle" font-size="13.5" font-weight="700" fill="#12876a">steuerfrei</text>
<text x="80" y="190" font-size="12.5" fill="#6b6357">Frist l&#228;uft taggenau ab notariellem Kaufvertrag &#183; Jahre seit Kauf &#8594;</text>
